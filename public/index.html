<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Chat with Friends</title>
    <style>
        /* Базовые переменные для светлой темы (по умолчанию) */
        :root {
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --sidebar-bg: #f8f9fa;
            --main-bg: #ffffff;
            --text-color: #333;
            --text-secondary: #666;
            --border-color: #e9ecef;
            --message-bg: #e9e9eb;
            --own-message-bg: #0088cc;
            --own-message-text: white;
            --input-bg: white;
            --shadow: 0 20px 60px rgba(0,0,0,0.1);
            --friend-item-bg: white;
            --friend-hover: #f1f3f5;
            --online-indicator: #2ecc71;
        }

        /* Тёмная тема */
        body.dark-theme {
            --bg-gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            --sidebar-bg: #1e1e2f;
            --main-bg: #0f0f1a;
            --text-color: #f0f0f0;
            --text-secondary: #aaa;
            --border-color: #2a2a3a;
            --message-bg: #2a2a3a;
            --own-message-bg: #4a4a8a;
            --own-message-text: white;
            --input-bg: #2a2a3a;
            --shadow: 0 20px 60px rgba(0,0,0,0.5);
            --friend-item-bg: #2a2a3a;
            --friend-hover: #3a3a4a;
            --online-indicator: #2ecc71;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            transition: background 0.3s;
        }

        .chat-container {
            width: 100%;
            max-width: 1300px;
            height: 90vh;
            background: var(--main-bg);
            border-radius: 20px;
            box-shadow: var(--shadow);
            display: flex;
            overflow: hidden;
        }

        /* Левая панель */
        .sidebar {
            width: 300px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 20px;
            transition: background 0.3s;
        }

        .profile {
            text-align: center;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 36px;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(102,126,234,0.3);
        }

        .username {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-color);
            margin-bottom: 5px;
        }

        .edit-profile {
            background: none;
            border: 1px solid #667eea;
            color: #667eea;
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            margin-right: 5px;
        }
        .edit-profile:hover {
            background: #667eea;
            color: white;
        }

        .theme-toggle {
            background: none;
            border: 1px solid var(--text-secondary);
            color: var(--text-color);
            padding: 5px 10px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            margin-top: 10px;
        }

        .friends-section {
            flex: 1;
            margin-top: 20px;
            overflow-y: auto;
        }

        .friends-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            color: var(--text-secondary);
        }

        .friends-header h3 {
            font-size: 16px;
            font-weight: 600;
        }

        .add-friend {
            background: none;
            border: 1px solid #28a745;
            color: #28a745;
            padding: 2px 10px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }

        .add-friend:hover {
            background: #28a745;
            color: white;
        }

        .friends-list {
            list-style: none;
        }

        .friend-item {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            border-radius: 10px;
            margin-bottom: 5px;
            background: var(--friend-item-bg);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: transform 0.2s;
            cursor: pointer;
            color: var(--text-color);
        }

        .friend-item:hover {
            transform: translateX(5px);
            background: var(--friend-hover);
        }

        .friend-item.active {
            background: rgba(102,126,234,0.2);
            border-left: 3px solid #667eea;
        }

        .friend-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin-right: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            font-size: 14px;
        }

        .friend-name {
            font-size: 14px;
            font-weight: 500;
            flex: 1;
        }

        .request-badge {
            background: #ff6b6b;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            margin-left: 5px;
        }

        /* Основная область */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--main-bg);
        }

        .chat-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h2 {
            color: var(--text-color);
            font-size: 20px;
        }

        .online-indicator {
            background: var(--sidebar-bg);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 14px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .online-indicator::before {
            content: '';
            width: 8px;
            height: 8px;
            background: var(--online-indicator);
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } }

        .messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            max-width: 60%;
            padding: 10px 15px;
            border-radius: 18px;
            background: var(--message-bg);
            color: var(--text-color);
            align-self: flex-start;
            word-wrap: break-word;
        }

        .message.own {
            align-self: flex-end;
            background: var(--own-message-bg);
            color: var(--own-message-text);
        }

        .message .user {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 4px;
            opacity: 0.8;
        }

        .message .text { font-size: 14px; line-height: 1.4; }
        .message .time {
            font-size: 10px;
            margin-top: 4px;
            text-align: right;
            opacity: 0.6;
        }

        .message img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 5px;
        }
        .message video {
            max-width: 100%;
            max-height: 250px;
            border-radius: 8px;
            margin-top: 5px;
        }
        .message audio { width: 100%; margin-top: 5px; }

        .system {
            text-align: center;
            font-size: 12px;
            color: var(--text-secondary);
            margin: 10px 0;
            font-style: italic;
        }

        .input-area {
            padding: 20px;
            border-top: 1px solid var(--border-color);
        }

        .input-row {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        #messageInput {
            flex: 1;
            min-width: 200px;
            padding: 12px 18px;
            border: 1px solid var(--border-color);
            border-radius: 25px;
            outline: none;
            font-size: 14px;
            background: var(--input-bg);
            color: var(--text-color);
        }

        .action-btn {
            padding: 10px 15px;
            border: none;
            border-radius: 25px;
            font-size: 14px;
            cursor: pointer;
            background: var(--sidebar-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .action-btn:hover { background: var(--friend-hover); }
        .action-btn.primary { background: #0088cc; color: white; border-color: #0088cc; }
        .action-btn.primary:hover { background: #0077b3; }
        .action-btn.record { background: #dc3545; color: white; border-color: #dc3545; }
        .action-btn.record.recording { animation: pulse 1s infinite; }

        #recordingIndicator {
            display: none;
            align-items: center;
            gap: 10px;
            color: #dc3545;
            font-weight: bold;
            margin-bottom: 10px;
        }

        /* Модальное окно входа */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--main-bg);
            padding: 40px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: var(--shadow);
        }
        .modal-content h2 { color: var(--text-color); margin-bottom: 20px; }
        .modal-content input {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            background: var(--input-bg);
            color: var(--text-color);
        }
        .modal-content button {
            width: 100%;
            padding: 12px;
            background: #0088cc;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        .error-message { color: #dc3545; margin-top: 10px; }

        /* Модальное окно заявок */
        .request-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--main-bg);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 2000;
            display: none;
        }
        .request-modal.active { display: block; }
        .request-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid var(--border-color);
        }
        .request-actions button {
            margin-left: 10px;
            padding: 5px 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .accept { background: #28a745; color: white; }
        .reject { background: #dc3545; color: white; }

        /* Медиа-запросы для мобильных */
        @media (max-width: 768px) {
            body { padding: 0; }
            .chat-container {
                height: 100vh;
                border-radius: 0;
            }
            .sidebar { width: 80px; padding: 10px; }
            .profile .avatar { width: 50px; height: 50px; font-size: 24px; }
            .username { font-size: 14px; word-break: break-word; }
            .edit-profile, .theme-toggle { font-size: 10px; padding: 3px 8px; }
            .friend-item { padding: 8px; justify-content: center; }
            .friend-avatar { margin-right: 0; }
            .friend-name { display: none; }
            .friends-header h3 { display: none; }
            .add-friend { padding: 2px 8px; font-size: 10px; }
            .chat-header h2 { font-size: 16px; }
            .input-row { gap: 5px; }
            .action-btn { padding: 8px 12px; font-size: 12px; }
            #messageInput { padding: 10px; font-size: 12px; min-width: 120px; }
            .message { max-width: 80%; }
        }
    </style>
</head>
<body>
    <!-- Модальное окно входа -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <h2>Добро пожаловать!</h2>
            <p>Введите ваше имя</p>
            <input type="text" id="loginUsername" placeholder="Имя" autocomplete="off">
            <button onclick="login()">Войти</button>
            <div id="loginError" class="error-message"></div>
        </div>
    </div>

    <!-- Модальное окно заявок в друзья -->
    <div id="requestModal" class="request-modal">
        <h3>Заявки в друзья</h3>
        <div id="requestList"></div>
        <button onclick="closeRequestModal()">Закрыть</button>
    </div>

    <div class="chat-container">
        <!-- Левая панель -->
        <div class="sidebar">
            <div class="profile">
                <div class="avatar" id="avatar">?</div>
                <div class="username" id="profileName">Гость</div>
                <div>
                    <button class="edit-profile" onclick="editProfile()">✎</button>
                    <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
                </div>
            </div>
            <div class="friends-section">
                <div class="friends-header">
                    <h3>👥 Друзья</h3>
                    <button class="add-friend" onclick="addFriend()">+</button>
                </div>
                <ul class="friends-list" id="friendsList">
                    <li class="friend-item active" onclick="switchRoom('general')">
                        <div class="friend-avatar">#</div>
                        <span class="friend-name">Общий</span>
                    </li>
                </ul>
                <div class="friends-header" style="margin-top: 20px;">
                    <h3>📨 Заявки</h3>
                    <span id="requestBadge" style="display:none;" class="request-badge">0</span>
                </div>
                <ul class="friends-list" id="requestsList"></ul>
            </div>
        </div>

        <!-- Основная область -->
        <div class="chat-main">
            <div class="chat-header">
                <h2 id="currentRoomName">Общий чат</h2>
                <div class="online-indicator">
                    <span id="onlineCount">0</span> онлайн
                </div>
            </div>
            <div class="messages" id="messages"></div>
            <div class="input-area">
                <div id="recordingIndicator">
                    <span>🔴 Запись...</span>
                    <span id="recordingTime">0</span>с
                </div>
                <div class="input-row">
                    <input type="text" id="messageInput" placeholder="Сообщение..." autocomplete="off" disabled>
                    <button class="action-btn" id="photoBtn" title="Фото" disabled>📷</button>
                    <button class="action-btn" id="videoBtn" title="Видео" disabled>🎥</button>
                    <button class="action-btn record" id="voiceBtn" title="Голосовое" disabled>🎤</button>
                    <button class="action-btn primary" id="sendBtn" disabled>➤</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Модальное окно для просмотра медиа -->
    <div id="mediaModal" class="modal" onclick="this.classList.remove('active')">
        <span class="modal-close" style="position:absolute; top:20px; right:30px; font-size:40px; color:white; cursor:pointer;">&times;</span>
        <img id="modalImage" src="" style="display:none; max-width:90%; max-height:90%;">
        <video id="modalVideo" controls style="display:none; max-width:90%; max-height:90%;"></video>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // ========== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ==========
        const socket = io();
        const messagesDiv = document.getElementById('messages');
        const input = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const photoBtn = document.getElementById('photoBtn');
        const videoBtn = document.getElementById('videoBtn');
        const voiceBtn = document.getElementById('voiceBtn');
        const profileName = document.getElementById('profileName');
        const avatar = document.getElementById('avatar');
        const onlineCountSpan = document.getElementById('onlineCount');
        const recordingIndicator = document.getElementById('recordingIndicator');
        const recordingTime = document.getElementById('recordingTime');
        const mediaModal = document.getElementById('mediaModal');
        const modalImage = document.getElementById('modalImage');
        const modalVideo = document.getElementById('modalVideo');
        const loginModal = document.getElementById('loginModal');
        const loginUsername = document.getElementById('loginUsername');
        const loginError = document.getElementById('loginError');
        const currentRoomName = document.getElementById('currentRoomName');
        const friendsList = document.getElementById('friendsList');
        const requestsList = document.getElementById('requestsList');
        const requestBadge = document.getElementById('requestBadge');
        const requestModal = document.getElementById('requestModal');
        const requestListDiv = document.getElementById('requestList');

        let currentUser = null;
        let friends = [];
        let friendRequests = [];
        let currentRoom = 'general';

        // Тема
        const savedTheme = localStorage.getItem('theme') || 'light';
        if (savedTheme === 'dark') document.body.classList.add('dark-theme');

        function toggleTheme() {
            document.body.classList.toggle('dark-theme');
            const isDark = document.body.classList.contains('dark-theme');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        // Определяем тип устройства
        const isTouchDevice = 'ontouchstart' in window;

        // ========== МОДАЛЬНОЕ ОКНО ВХОДА ==========
        async function login() {
            const username = loginUsername.value.trim();
            if (!username) {
                loginError.textContent = 'Введите имя';
                return;
            }
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username })
                });
                const data = await response.json();
                if (data.success) {
                    currentUser = data.user.username;
                    friends = data.user.friends || [];
                    friendRequests = data.user.friendRequests || [];
                    localStorage.setItem('chatUser', currentUser);
                    profileName.textContent = currentUser;
                    avatar.textContent = currentUser.charAt(0).toUpperCase();
                    loginModal.classList.remove('active');
                    enableChat();
                    socket.emit('identify', currentUser);
                    renderFriends();
                    renderRequests();
                    switchRoom('general');
                } else {
                    loginError.textContent = data.error || 'Ошибка входа';
                }
            } catch (err) {
                console.error('Ошибка входа:', err);
                loginError.textContent = 'Ошибка соединения';
            }
        }

        // Автоматический вход
        const savedUser = localStorage.getItem('chatUser');
        if (savedUser) {
            loginUsername.value = savedUser;
            login();
        } else {
            loginModal.classList.add('active');
        }

        function enableChat() {
            input.disabled = false;
            photoBtn.disabled = false;
            videoBtn.disabled = false;
            voiceBtn.disabled = false;
            sendBtn.disabled = false;
        }

        // ========== ЗАПРОСЫ В ДРУЗЬЯ ==========
        socket.on('friend-request', ({ from }) => {
            // Добавляем в список заявок
            if (!friendRequests.includes(from)) {
                friendRequests.push(from);
                renderRequests();
            }
        });

        async function addFriend() {
            const friendName = prompt('Введите имя друга:');
            if (!friendName || friendName.trim() === '') return;
            try {
                const response = await fetch('/api/send-friend-request', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ from: currentUser, to: friendName.trim() })
                });
                const data = await response.json();
                if (data.success) {
                    alert('Заявка отправлена');
                } else {
                    alert(data.message || 'Не удалось отправить заявку');
                }
            } catch (err) {
                console.error('Ошибка:', err);
            }
        }

        async function acceptRequest(requester) {
            const response = await fetch('/api/accept-friend-request', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: currentUser, requester })
            });
            const data = await response.json();
            if (data.success) {
                friendRequests = friendRequests.filter(r => r !== requester);
                friends = data.friends;
                renderFriends();
                renderRequests();
            }
        }

        async function rejectRequest(requester) {
            const response = await fetch('/api/reject-friend-request', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: currentUser, requester })
            });
            const data = await response.json();
            if (data.success) {
                friendRequests = friendRequests.filter(r => r !== requester);
                renderRequests();
            }
        }

        function renderRequests() {
            if (friendRequests.length === 0) {
                requestsList.innerHTML = '';
                requestBadge.style.display = 'none';
                return;
            }
            requestBadge.style.display = 'flex';
            requestBadge.textContent = friendRequests.length;
            requestsList.innerHTML = '';
            friendRequests.forEach(req => {
                const li = document.createElement('li');
                li.className = 'friend-item';
                li.innerHTML = `
                    <div class="friend-avatar">${req.charAt(0).toUpperCase()}</div>
                    <span class="friend-name">${req}</span>
                    <button class="accept" onclick="acceptRequest('${req}')">✓</button>
                    <button class="reject" onclick="rejectRequest('${req}')">✗</button>
                `;
                requestsList.appendChild(li);
            });
        }

        function renderFriends() {
            const list = document.getElementById('friendsList');
            list.innerHTML = '<li class="friend-item active" onclick="switchRoom(\'general\')"><div class="friend-avatar">#</div><span class="friend-name">Общий</span></li>';
            friends.forEach(friend => {
                const li = document.createElement('li');
                li.className = 'friend-item';
                li.setAttribute('onclick', `switchRoom('private:${currentUser}:${friend}')`);
                li.innerHTML = `
                    <div class="friend-avatar">${friend.charAt(0).toUpperCase()}</div>
                    <span class="friend-name">${friend}</span>
                `;
                list.appendChild(li);
            });
        }

        function editProfile() {
            alert('Редактирование профиля будет добавлено позже');
        }

        // ========== ПЕРЕКЛЮЧЕНИЕ КОМНАТ ==========
        function switchRoom(room) {
            currentRoom = room;
            if (room === 'general') {
                currentRoomName.textContent = 'Общий чат';
            } else {
                const parts = room.split(':');
                const other = parts[1] === currentUser ? parts[2] : parts[1];
                currentRoomName.textContent = `Чат с ${other}`;
            }
            // Подсветка активного
            document.querySelectorAll('.friend-item').forEach(el => el.classList.remove('active'));
            event.target.closest('.friend-item')?.classList.add('active');
            socket.emit('join-room', room);
        }

        // ========== ЧАТ ==========
        socket.on('online-count', (count) => {
            onlineCountSpan.textContent = count;
        });

        socket.on('history', (history) => {
            messagesDiv.innerHTML = '';
            history.forEach(addMessage);
        });

        socket.on('message', addMessage);
        socket.on('system', addSystem);

        function addMessage(msg) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');
            if (msg.user === currentUser) msgDiv.classList.add('own');

            let content = `<div class="user">${msg.user}</div>`;

            if (msg.type === 'image') {
                content += `<img src="${msg.url}" alt="Фото" onclick="showMedia('${msg.url}', 'image')">`;
                if (msg.text) content += `<div class="text">${msg.text}</div>`;
            } else if (msg.type === 'video') {
                content += `<video src="${msg.url}" controls onclick="showMedia('${msg.url}', 'video')"></video>`;
                if (msg.text) content += `<div class="text">${msg.text}</div>`;
            } else if (msg.type === 'audio') {
                content += `<audio controls src="${msg.url}"></audio>`;
                if (msg.text) content += `<div class="text">${msg.text}</div>`;
            } else {
                content += `<div class="text">${msg.text}</div>`;
            }

            content += `<div class="time">${msg.time}</div>`;
            msgDiv.innerHTML = content;

            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function addSystem(text) {
            const sysDiv = document.createElement('div');
            sysDiv.classList.add('system');
            sysDiv.textContent = text;
            messagesDiv.appendChild(sysDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function sendMessage() {
            const text = input.value.trim();
            if (text) {
                socket.emit('message', { text, room: currentRoom });
                input.value = '';
            }
        }
        sendBtn.addEventListener('click', sendMessage);
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // ========== ЗАГРУЗКА ФАЙЛОВ ==========
        function createFileInput(accept, callback) {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = accept;
            input.style.display = 'none';
            document.body.appendChild(input);
            input.addEventListener('change', async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                if (file.size > 50 * 1024 * 1024) {
                    alert('Файл слишком большой (макс. 50 МБ)');
                    return;
                }
                callback(file);
                input.remove();
            });
            input.click();
        }

        photoBtn.addEventListener('click', () => {
            if (!currentUser) return;
            createFileInput('image/*', async (file) => {
                const formData = new FormData();
                formData.append('file', file);
                try {
                    const response = await fetch('/upload', { method: 'POST', body: formData });
                    const result = await response.json();
                    if (result.success) {
                        const caption = prompt('Подпись к фото:', '');
                        socket.emit('media-message', {
                            mediaData: {
                                type: 'image',
                                url: result.url,
                                fileName: result.name,
                                text: caption || ''
                            },
                            room: currentRoom
                        });
                    }
                } catch (error) {
                    console.error('Ошибка загрузки фото:', error);
                    alert('Не удалось загрузить фото');
                }
            });
        });

        videoBtn.addEventListener('click', () => {
            if (!currentUser) return;
            createFileInput('video/*', async (file) => {
                const formData = new FormData();
                formData.append('file', file);
                try {
                    const response = await fetch('/upload', { method: 'POST', body: formData });
                    const result = await response.json();
                    if (result.success) {
                        const caption = prompt('Подпись к видео:', '');
                        socket.emit('media-message', {
                            mediaData: {
                                type: 'video',
                                url: result.url,
                                fileName: result.name,
                                text: caption || ''
                            },
                            room: currentRoom
                        });
                    }
                } catch (error) {
                    console.error('Ошибка загрузки видео:', error);
                    alert('Не удалось загрузить видео');
                }
            });
        });

        // ========== ГОЛОСОВЫЕ (улучшенное качество) ==========
        let mediaRecorder = null;
        let audioChunks = [];
        let recordingTimer = null;
        let seconds = 0;
        let mediaStream = null;
        let isRecording = false;

        if (isTouchDevice) {
            // Мобильные: удержание
            voiceBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (!currentUser) return;
                startRecording();
            });
            voiceBtn.addEventListener('touchend', stopRecording);
            voiceBtn.addEventListener('touchcancel', stopRecording);
        } else {
            // ПК: клик для старта/остановки
            voiceBtn.addEventListener('click', () => {
                if (!currentUser) return;
                if (isRecording) {
                    stopRecording();
                } else {
                    startRecording();
                }
            });
        }

        async function startRecording() {
            if (isRecording) return;
            isRecording = true;

            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        channelCount: 1,
                        sampleRate: 48000,
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true
                    }
                });

                const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
                    ? 'audio/webm;codecs=opus'
                    : 'audio/webm';

                const options = { mimeType, audioBitsPerSecond: 320000 }; // 320 kbps

                mediaRecorder = new MediaRecorder(mediaStream, options);
                audioChunks = [];

                mediaRecorder.ondataavailable = (event) => {
                    if (event.data && event.data.size > 0) {
                        audioChunks.push(event.data);
                    }
                };

                mediaRecorder.onstop = async () => {
                    // Немедленно останавливаем треки
                    if (mediaStream) {
                        mediaStream.getTracks().forEach(track => track.stop());
                        mediaStream = null;
                    }

                    if (audioChunks.length > 0) {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        await sendVoiceMessage(audioBlob);
                    }

                    recordingIndicator.style.display = 'none';
                    voiceBtn.classList.remove('record');
                    clearInterval(recordingTimer);
                    recordingTimer = null;
                    seconds = 0;
                    mediaRecorder = null;
                    isRecording = false;
                };

                mediaRecorder.onerror = (event) => {
                    console.error('MediaRecorder ошибка:', event.error);
                    stopRecording();
                };

                mediaRecorder.start(1000); // данные каждую секунду

                recordingIndicator.style.display = 'flex';
                voiceBtn.classList.add('record');

                seconds = 0;
                recordingTime.textContent = '0';
                recordingTimer = setInterval(() => {
                    seconds++;
                    recordingTime.textContent = seconds;
                }, 1000);

            } catch (error) {
                console.error('Ошибка доступа к микрофону:', error);
                alert('Не удалось получить доступ к микрофону');
                recordingIndicator.style.display = 'none';
                voiceBtn.classList.remove('record');
                isRecording = false;
            }
        }

        function stopRecording() {
            if (!isRecording) return;
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                try {
                    mediaRecorder.stop();
                } catch (e) {
                    console.error('Ошибка остановки:', e);
                    forceStopRecording();
                }
            } else {
                forceStopRecording();
            }
        }

        function forceStopRecording() {
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
                mediaStream = null;
            }
            recordingIndicator.style.display = 'none';
            voiceBtn.classList.remove('record');
            clearInterval(recordingTimer);
            recordingTimer = null;
            seconds = 0;
            mediaRecorder = null;
            isRecording = false;
        }

        async function sendVoiceMessage(blob) {
            const formData = new FormData();
            formData.append('file', blob, 'voice.webm');

            try {
                const response = await fetch('/upload', { method: 'POST', body: formData });
                const result = await response.json();
                if (result.success) {
                    socket.emit('media-message', {
                        mediaData: {
                            type: 'audio',
                            url: result.url,
                            fileName: result.name,
                            text: `🎤 Голосовое (${seconds}с)`
                        },
                        room: currentRoom
                    });
                } else {
                    alert('Ошибка загрузки голосового');
                }
            } catch (error) {
                console.error('Ошибка загрузки голоса:', error);
                alert('Не удалось загрузить голосовое');
            }
        }

        // ========== ПРОСМОТР МЕДИА ==========
        window.showMedia = function(url, type) {
            if (type === 'image') {
                modalImage.src = url;
                modalImage.style.display = 'block';
                modalVideo.style.display = 'none';
            } else {
                modalVideo.src = url;
                modalVideo.style.display = 'block';
                modalImage.style.display = 'none';
                modalVideo.play().catch(e => console.log('Автовоспроизведение заблокировано'));
            }
            mediaModal.classList.add('active');
        };

        mediaModal.onclick = function() {
            mediaModal.classList.remove('active');
            modalVideo.pause();
        };

        // Пинг
        setInterval(() => {
            if (currentUser) socket.emit('ping');
        }, 3000);
    </script>
</body>
</html>
