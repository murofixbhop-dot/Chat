<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat with Friends</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 1300px;
            height: 90vh;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 32px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.1);
            display: flex;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* Левая панель */
        .sidebar {
            width: 300px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            padding: 24px;
        }

        .profile {
            text-align: center;
            padding-bottom: 24px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 42px;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(102,126,234,0.5);
            border: 3px solid rgba(255,255,255,0.2);
            transition: transform 0.3s;
        }
        .avatar:hover { transform: scale(1.05); }

        .username {
            font-size: 22px;
            font-weight: 600;
            color: white;
            margin-bottom: 8px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .edit-profile {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 6px 18px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            backdrop-filter: blur(5px);
        }
        .edit-profile:hover {
            background: rgba(255,255,255,0.3);
            border-color: white;
        }

        .friends-section {
            flex: 1;
            margin-top: 24px;
            overflow-y: auto;
        }

        .friends-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            color: rgba(255,255,255,0.8);
        }
        .friends-header h3 {
            font-size: 16px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .add-friend {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 4px 12px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }
        .add-friend:hover { background: rgba(255,255,255,0.3); }

        .friends-list {
            list-style: none;
        }
        .friend-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-radius: 16px;
            margin-bottom: 8px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.2s;
            cursor: pointer;
        }
        .friend-item:hover {
            background: rgba(255,255,255,0.2);
            transform: translateX(5px);
        }
        .friend-item.active {
            background: rgba(102,126,234,0.3);
            border-color: #667eea;
        }
        .friend-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            font-size: 18px;
        }
        .friend-name {
            font-size: 15px;
            font-weight: 500;
            color: white;
        }

        /* Основная область */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
        }

        .chat-header {
            padding: 24px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-header h2 {
            color: white;
            font-size: 22px;
            font-weight: 600;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        .online-indicator {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(5px);
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 14px;
            color: white;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .online-indicator::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #2ecc71;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } }

        .messages {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 60%;
            padding: 12px 18px;
            border-radius: 22px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            align-self: flex-start;
            word-wrap: break-word;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.own {
            align-self: flex-end;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-color: rgba(255,255,255,0.3);
        }
        .message .user {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 4px;
            opacity: 0.8;
        }
        .message .text { font-size: 14px; line-height: 1.4; }
        .message .time {
            font-size: 10px;
            margin-top: 6px;
            text-align: right;
            opacity: 0.6;
        }
        .message img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 8px;
        }
        .message video {
            max-width: 100%;
            max-height: 250px;
            border-radius: 12px;
            margin-top: 8px;
        }
        .message audio { width: 100%; margin-top: 8px; }

        .system {
            text-align: center;
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            margin: 10px 0;
            font-style: italic;
        }

        .input-area {
            padding: 24px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .input-row {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        #messageInput {
            flex: 1;
            padding: 14px 20px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 40px;
            outline: none;
            font-size: 15px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
            color: white;
            transition: all 0.3s;
        }
        #messageInput:focus { border-color: #667eea; background: rgba(255,255,255,0.15); }
        #messageInput::placeholder { color: rgba(255,255,255,0.5); }

        .action-btn {
            padding: 12px 18px;
            border: none;
            border-radius: 40px;
            font-size: 15px;
            cursor: pointer;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(5px);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .action-btn:hover { background: rgba(255,255,255,0.3); transform: scale(1.05); }
        .action-btn.primary { background: #667eea; border-color: #667eea; }
        .action-btn.primary:hover { background: #5a67d8; }
        .action-btn.record { background: #dc3545; border-color: #dc3545; animation: pulse 1s infinite; }

        #recordingIndicator {
            display: none;
            align-items: center;
            gap: 12px;
            color: #ff6b6b;
            font-weight: bold;
            margin-bottom: 12px;
            background: rgba(0,0,0,0.3);
            padding: 8px 16px;
            border-radius: 40px;
            backdrop-filter: blur(5px);
        }

        /* Модальное окно входа */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 32px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }
        .modal-content h2 {
            color: white;
            margin-bottom: 20px;
            font-size: 28px;
        }
        .modal-content p { color: rgba(255,255,255,0.8); margin-bottom: 20px; }
        .modal-content input {
            width: 100%;
            padding: 14px 18px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 40px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 16px;
            outline: none;
        }
        .modal-content input:focus { border-color: #667eea; }
        .modal-content button {
            width: 100%;
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .modal-content button:hover { background: #5a67d8; }
        .error-message { color: #ff6b6b; margin-top: 10px; }

        /* Модальное окно для медиа */
        #mediaModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            z-index: 3000;
        }
        #mediaModal.active { display: flex; }
        #mediaModal .modal-close {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 40px;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- Модальное окно входа -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <h2>Добро пожаловать!</h2>
            <p>Введите ваше имя, чтобы войти или зарегистрироваться</p>
            <input type="text" id="loginUsername" placeholder="Ваше имя" autocomplete="off">
            <button onclick="login()">Продолжить</button>
            <div id="loginError" class="error-message"></div>
        </div>
    </div>

    <div class="chat-container">
        <!-- Левая панель -->
        <div class="sidebar">
            <div class="profile">
                <div class="avatar" id="avatar">?</div>
                <div class="username" id="profileName">Гость</div>
                <button class="edit-profile" onclick="editProfile()">✎ Редактировать</button>
            </div>
            <div class="friends-section">
                <div class="friends-header">
                    <h3>👥 Друзья</h3>
                    <button class="add-friend" onclick="addFriend()">+ Добавить</button>
                </div>
                <ul class="friends-list" id="friendsList">
                    <li class="friend-item active" onclick="switchRoom('general')">
                        <div class="friend-avatar">#</div>
                        <span class="friend-name">Общий чат</span>
                    </li>
                </ul>
            </div>
        </div>

        <!-- Основная область -->
        <div class="chat-main">
            <div class="chat-header">
                <h2 id="currentRoomName">Общий чат</h2>
                <div class="online-indicator">
                    <span id="onlineCount">0</span> онлайн
                </div>
            </div>
            <div class="messages" id="messages"></div>
            <div class="input-area">
                <div id="recordingIndicator">
                    <span>🔴 Запись...</span>
                    <span id="recordingTime">0</span>с
                </div>
                <div class="input-row">
                    <input type="text" id="messageInput" placeholder="Введите сообщение..." autocomplete="off" disabled>
                    <button class="action-btn" id="photoBtn" title="Отправить фото" disabled>📷</button>
                    <button class="action-btn" id="videoBtn" title="Отправить видео" disabled>🎥</button>
                    <button class="action-btn record" id="voiceBtn" title="Голосовое сообщение" disabled>🎤</button>
                    <button class="action-btn primary" id="sendBtn" disabled>➤</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Модальное окно для просмотра медиа -->
    <div id="mediaModal" onclick="this.classList.remove('active')">
        <span class="modal-close">&times;</span>
        <img id="modalImage" src="" style="display: none; max-width: 90%; max-height: 90%;">
        <video id="modalVideo" controls style="display: none; max-width: 90%; max-height: 90%;"></video>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // ========== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ==========
        const socket = io();
        const messagesDiv = document.getElementById('messages');
        const input = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const photoBtn = document.getElementById('photoBtn');
        const videoBtn = document.getElementById('videoBtn');
        const voiceBtn = document.getElementById('voiceBtn');
        const profileName = document.getElementById('profileName');
        const avatar = document.getElementById('avatar');
        const onlineCountSpan = document.getElementById('onlineCount');
        const recordingIndicator = document.getElementById('recordingIndicator');
        const recordingTime = document.getElementById('recordingTime');
        const mediaModal = document.getElementById('mediaModal');
        const modalImage = document.getElementById('modalImage');
        const modalVideo = document.getElementById('modalVideo');
        const loginModal = document.getElementById('loginModal');
        const loginUsername = document.getElementById('loginUsername');
        const loginError = document.getElementById('loginError');
        const currentRoomName = document.getElementById('currentRoomName');
        const friendsList = document.getElementById('friendsList');

        let currentUser = null;
        let friends = [];
        let currentRoom = 'general'; // текущая комната

        // Определяем тип устройства
        const isTouchDevice = 'ontouchstart' in window;

        // ========== МОДАЛЬНОЕ ОКНО ВХОДА ==========
        async function login() {
            const username = loginUsername.value.trim();
            if (!username) {
                loginError.textContent = 'Введите имя';
                return;
            }
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username })
                });
                const data = await response.json();
                if (data.success) {
                    currentUser = data.user.username;
                    friends = data.user.friends || [];
                    localStorage.setItem('chatUser', currentUser);
                    profileName.textContent = currentUser;
                    avatar.textContent = currentUser.charAt(0).toUpperCase();
                    loginModal.classList.remove('active');
                    enableChat();
                    socket.emit('identify', currentUser);
                    loadFriends();
                    switchRoom('general'); // по умолчанию общий чат
                } else {
                    loginError.textContent = data.error || 'Ошибка входа';
                }
            } catch (err) {
                console.error('Ошибка входа:', err);
                loginError.textContent = 'Ошибка соединения';
            }
        }

        // Автоматический вход, если есть сохранённый пользователь
        const savedUser = localStorage.getItem('chatUser');
        if (savedUser) {
            loginUsername.value = savedUser;
            login(); // сразу пытаемся войти
        } else {
            loginModal.classList.add('active');
        }

        function enableChat() {
            input.disabled = false;
            photoBtn.disabled = false;
            videoBtn.disabled = false;
            voiceBtn.disabled = false;
            sendBtn.disabled = false;
        }

        // ========== УПРАВЛЕНИЕ ДРУЗЬЯМИ ==========
        async function loadFriends() {
            const response = await fetch('/api/get-friends', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: currentUser })
            });
            const data = await response.json();
            friends = data.friends || [];
            renderFriends();
        }

        function renderFriends() {
            // Оставляем первый элемент "Общий чат"
            const list = document.getElementById('friendsList');
            list.innerHTML = '<li class="friend-item active" onclick="switchRoom(\'general\')"><div class="friend-avatar">#</div><span class="friend-name">Общий чат</span></li>';
            friends.forEach(friend => {
                const li = document.createElement('li');
                li.className = 'friend-item';
                li.setAttribute('onclick', `switchRoom('private:${currentUser}:${friend}')`);
                li.innerHTML = `
                    <div class="friend-avatar">${friend.charAt(0).toUpperCase()}</div>
                    <span class="friend-name">${friend}</span>
                `;
                list.appendChild(li);
            });
        }

        async function addFriend() {
            const friendName = prompt('Введите имя друга:');
            if (!friendName || friendName.trim() === '') return;
            try {
                const response = await fetch('/api/add-friend', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: currentUser, friendName: friendName.trim() })
                });
                const data = await response.json();
                if (data.success) {
                    friends = data.friends;
                    renderFriends();
                } else {
                    alert(data.error || 'Не удалось добавить друга');
                }
            } catch (err) {
                console.error('Ошибка добавления друга:', err);
            }
        }

        function editProfile() {
            const newName = prompt('Введите новое имя (функция временно недоступна)');
            if (newName) alert('Смена имени будет позже');
        }

        // ========== ПЕРЕКЛЮЧЕНИЕ КОМНАТ ==========
        function switchRoom(room) {
            currentRoom = room;
            // Обновляем заголовок
            if (room === 'general') {
                currentRoomName.textContent = 'Общий чат';
            } else {
                const parts = room.split(':');
                const other = parts[1] === currentUser ? parts[2] : parts[1];
                currentRoomName.textContent = `Чат с ${other}`;
            }
            // Подсветка активного друга
            document.querySelectorAll('.friend-item').forEach(el => el.classList.remove('active'));
            // Находим элемент по комнате (сложно, проще добавить data-атрибут, но для простоты пропустим)
            // Временно будем просто отправлять событие на сервер
            socket.emit('join-room', room);
        }

        // ========== ЧАТ ==========
        socket.on('online-count', (count) => {
            onlineCountSpan.textContent = count;
        });

        socket.on('history', (history) => {
            messagesDiv.innerHTML = '';
            history.forEach(addMessage);
        });

        socket.on('message', addMessage);
        socket.on('system', addSystem);

        function addMessage(msg) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');
            if (msg.user === currentUser) msgDiv.classList.add('own');

            let content = `<div class="user">${msg.user}</div>`;

            if (msg.type === 'image') {
                content += `<img src="${msg.url}" alt="Фото" onclick="showMedia('${msg.url}', 'image')">`;
                if (msg.text) content += `<div class="text">${msg.text}</div>`;
            } else if (msg.type === 'video') {
                content += `<video src="${msg.url}" controls onclick="showMedia('${msg.url}', 'video')"></video>`;
                if (msg.text) content += `<div class="text">${msg.text}</div>`;
            } else if (msg.type === 'audio') {
                content += `<audio controls src="${msg.url}"></audio>`;
                if (msg.text) content += `<div class="text">${msg.text}</div>`;
            } else {
                content += `<div class="text">${msg.text}</div>`;
            }

            content += `<div class="time">${msg.time}</div>`;
            msgDiv.innerHTML = content;

            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function addSystem(text) {
            const sysDiv = document.createElement('div');
            sysDiv.classList.add('system');
            sysDiv.textContent = text;
            messagesDiv.appendChild(sysDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function sendMessage() {
            const text = input.value.trim();
            if (text) {
                socket.emit('message', { text, room: currentRoom });
                input.value = '';
            }
        }
        sendBtn.addEventListener('click', sendMessage);
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // ========== ЗАГРУЗКА ФАЙЛОВ ==========
        function createFileInput(accept, callback) {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = accept;
            input.style.display = 'none';
            document.body.appendChild(input);
            input.addEventListener('change', async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                // Проверка размера (уже на сервере, но для удобства)
                if (file.size > 50 * 1024 * 1024) {
                    alert('Файл слишком большой (макс. 50 МБ)');
                    return;
                }
                callback(file);
                input.remove();
            });
            input.click();
        }

        photoBtn.addEventListener('click', () => {
            if (!currentUser) return;
            createFileInput('image/*', async (file) => {
                const formData = new FormData();
                formData.append('file', file);
                try {
                    const response = await fetch('/upload', { method: 'POST', body: formData });
                    const result = await response.json();
                    if (result.success) {
                        const caption = prompt('Подпись к фото (необязательно):', '');
                        socket.emit('media-message', {
                            mediaData: {
                                type: 'image',
                                url: result.url,
                                fileName: result.name,
                                text: caption || ''
                            },
                            room: currentRoom
                        });
                    }
                } catch (error) {
                    console.error('Ошибка загрузки фото:', error);
                    alert('Не удалось загрузить фото');
                }
            });
        });

        videoBtn.addEventListener('click', () => {
            if (!currentUser) return;
            createFileInput('video/*', async (file) => {
                const formData = new FormData();
                formData.append('file', file);
                try {
                    const response = await fetch('/upload', { method: 'POST', body: formData });
                    const result = await response.json();
                    if (result.success) {
                        const caption = prompt('Подпись к видео (необязательно):', '');
                        socket.emit('media-message', {
                            mediaData: {
                                type: 'video',
                                url: result.url,
                                fileName: result.name,
                                text: caption || ''
                            },
                            room: currentRoom
                        });
                    }
                } catch (error) {
                    console.error('Ошибка загрузки видео:', error);
                    alert('Не удалось загрузить видео');
                }
            });
        });

        // ========== ГОЛОСОВЫЕ (ПК/МОБИЛЬНЫЕ) ==========
        let mediaRecorder = null;
        let audioChunks = [];
        let recordingTimer = null;
        let seconds = 0;
        let mediaStream = null;
        let isRecording = false;

        if (isTouchDevice) {
            // Мобильные: удержание
            voiceBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (!currentUser) return;
                startRecording();
            });
            voiceBtn.addEventListener('touchend', stopRecording);
            voiceBtn.addEventListener('touchcancel', stopRecording);
        } else {
            // ПК: клик для старта, повторный клик для остановки
            voiceBtn.addEventListener('click', () => {
                if (!currentUser) return;
                if (isRecording) {
                    stopRecording();
                } else {
                    startRecording();
                }
            });
        }

        async function startRecording() {
            if (isRecording) return;
            isRecording = true;

            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        channelCount: 1,
                        sampleRate: 48000,
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true
                    }
                });

                const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
                    ? 'audio/webm;codecs=opus'
                    : 'audio/webm';

                const options = { mimeType, audioBitsPerSecond: 256000 };

                mediaRecorder = new MediaRecorder(mediaStream, options);
                audioChunks = [];

                mediaRecorder.ondataavailable = (event) => {
                    if (event.data && event.data.size > 0) {
                        audioChunks.push(event.data);
                    }
                };

                mediaRecorder.onstop = async () => {
                    if (mediaStream) {
                        mediaStream.getTracks().forEach(track => track.stop());
                        mediaStream = null;
                    }

                    if (audioChunks.length > 0) {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        await sendVoiceMessage(audioBlob);
                    }

                    recordingIndicator.style.display = 'none';
                    voiceBtn.classList.remove('record');
                    clearInterval(recordingTimer);
                    recordingTimer = null;
                    seconds = 0;
                    mediaRecorder = null;
                    isRecording = false;
                };

                mediaRecorder.onerror = (event) => {
                    console.error('MediaRecorder ошибка:', event.error);
                    stopRecording();
                };

                mediaRecorder.start(1000);

                recordingIndicator.style.display = 'flex';
                voiceBtn.classList.add('record');

                seconds = 0;
                recordingTime.textContent = '0';
                recordingTimer = setInterval(() => {
                    seconds++;
                    recordingTime.textContent = seconds;
                }, 1000);

            } catch (error) {
                console.error('Ошибка доступа к микрофону:', error);
                alert('Не удалось получить доступ к микрофону. Проверьте разрешения.');
                recordingIndicator.style.display = 'none';
                voiceBtn.classList.remove('record');
                isRecording = false;
            }
        }

        function stopRecording() {
            if (!isRecording) return;
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                try {
                    mediaRecorder.stop();
                } catch (e) {
                    console.error('Ошибка при остановке записи:', e);
                    forceStopRecording();
                }
            } else {
                forceStopRecording();
            }
        }

        function forceStopRecording() {
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
                mediaStream = null;
            }
            recordingIndicator.style.display = 'none';
            voiceBtn.classList.remove('record');
            clearInterval(recordingTimer);
            recordingTimer = null;
            seconds = 0;
            mediaRecorder = null;
            isRecording = false;
        }

        async function sendVoiceMessage(blob) {
            const formData = new FormData();
            formData.append('file', blob, 'voice.webm');

            try {
                const response = await fetch('/upload', { method: 'POST', body: formData });
                const result = await response.json();
                if (result.success) {
                    socket.emit('media-message', {
                        mediaData: {
                            type: 'audio',
                            url: result.url,
                            fileName: result.name,
                            text: `🎤 Голосовое (${seconds}с)`
                        },
                        room: currentRoom
                    });
                } else {
                    alert('Ошибка загрузки голосового');
                }
            } catch (error) {
                console.error('Ошибка загрузки голоса:', error);
                alert('Не удалось загрузить голосовое');
            }
        }

        // ========== ПРОСМОТР МЕДИА ==========
        window.showMedia = function(url, type) {
            if (type === 'image') {
                modalImage.src = url;
                modalImage.style.display = 'block';
                modalVideo.style.display = 'none';
            } else {
                modalVideo.src = url;
                modalVideo.style.display = 'block';
                modalImage.style.display = 'none';
                modalVideo.play().catch(e => console.log('Автовоспроизведение заблокировано'));
            }
            mediaModal.classList.add('active');
        };

        mediaModal.onclick = function() {
            mediaModal.classList.remove('active');
            modalVideo.pause();
        };

        // Пинг
        setInterval(() => {
            if (currentUser) socket.emit('ping');
        }, 3000);
    </script>
</body>
</html>
